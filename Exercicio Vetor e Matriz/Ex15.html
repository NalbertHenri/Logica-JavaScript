<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

    <script>
        let nomes = [];
        for (let i = 0; i < 5; i++) {
            let nome = prompt("Digite um nome:");
            nomes.push(nome);
        }
        nomes.sort();
        console.log("Nomes em ordem alfabética:", nomes);
    </script>
</body>
