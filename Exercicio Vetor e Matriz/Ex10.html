<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 10</title>
</head>
<body>
    
    <script>
        let encontrouZero = false;

        for (let i = 0; i < 5; i++) {
            let numero = parseInt(prompt("Digite um número inteiro:"));
            if (numero === 0) {
                encontrouZero = true;
                break;
            }
        }

        if (encontrouZero) {
            alert("Foi encontrado um número igual a zero.");
        } else {
            alert("Nenhum número igual a zero foi encontrado.");
        }
    </script>
    
</body>
</html>
