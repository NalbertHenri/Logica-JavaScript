<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let contadorPares = 0;

        for (let i = 0; i < 5; i++) {
            let numero = Number(prompt("Digite um número inteiro: "));
            
            if (numero % 2 === 0) {
                contadorPares++;
            }
        }

        document.write("Quantidade de números pares: " + contadorPares);
    </script>
</body>
</html>
