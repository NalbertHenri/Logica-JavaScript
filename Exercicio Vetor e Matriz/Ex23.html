<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 23</title>
</head>
<body>
    
    <script>
        let matriz = [];
        let menorValor = Infinity;
        for (let i = 0; i < 3; i++) {
            matriz[i] = [];
            for (let j = 0; j < 3; j++) {
                matriz[i][j] = parseInt(prompt(`Digite um número inteiro para a posição [${i}][${j}]:`));
                if (matriz[i][j] < menorValor) {
                    menorValor = matriz[i][j];
                }
            }
        }
        console.log("Matriz 3x3:");
        for (let i = 0; i < 3; i++) {
            console.log(matriz[i].join(" "));
        }
        console.log("Menor valor presente na matriz:", menorValor);
    </script>
    
</body>
</html>
