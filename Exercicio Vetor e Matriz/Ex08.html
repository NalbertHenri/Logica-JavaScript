<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 8</title>
</head>
<body>
    <script>
        let somaPares = 0;
        let contadorPares = 0;
        let somaImpares = 0;
        let contadorImpares = 0;

        for (let i = 0; i < 5; i++) {
            let numero = parseInt(prompt("Digite um número inteiro:"));

            if (numero % 2 === 0) {
                somaPares += numero;
                contadorPares++;
            } else {
                somaImpares += numero;
                contadorImpares++;
            }
        }

        let mediaPares = contadorPares > 0 ? somaPares / contadorPares : 0;
        let mediaImpares = contadorImpares > 0 ? somaImpares / contadorImpares : 0;

        alert("Média dos valores pares: " + mediaPares + "\nMédia dos valores ímpares: " + mediaImpares);
    </script>
    </body>
</html>
