<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 17</title>
</head>
<body>

    <script>
        let matriz = [];
        let soma = 0;
        for (let i = 0; i < 2; i++) {
            matriz[i] = [];
            for (let j = 0; j < 2; j++) {
                matriz[i][j] = parseInt(prompt(`Digite um número inteiro para a posição [${i}][${j}]:`));
                soma += matriz[i][j];
            }
        }
        console.log("Matriz 2x2:");
        for (let i = 0; i < 2; i++) {
            console.log(matriz[i].join(" "));
        }
        console.log("Soma de todos os elementos:", soma);
    </script>
    
</body>
</html>
