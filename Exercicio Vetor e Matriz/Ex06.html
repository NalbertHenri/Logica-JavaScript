<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numero = []

        for (let i = 0; i < 10; i++) {
            let valor = Number(prompt("Digite um numero: "))
            numero.push(valor)
        }

        numero.sort((a, b) => a - b)
    </script>
</body>
</html>
