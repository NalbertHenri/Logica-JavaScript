<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 29</title>
</head>
<body>

    <script>
        let matriz = [];
        let ehIdentidade = true;

        // Leitura da Matriz 3x3
        for (let i = 0; i < 3; i++) {
            matriz[i] = [];
            for (let j = 0; j < 3; j++) {
                matriz[i][j] = parseInt(prompt(`Digite um número inteiro para a posição [${i}][${j}]:`));
                // Verificação se é uma matriz identidade
                if ((i === j && matriz[i][j] !== 1) || (i !== j && matriz[i][j] !== 0)) {
                    ehIdentidade = false;
                }
            }
        }

        // Exibição da Matriz e do resultado
        console.log("Matriz 3x3:");
        for (let i = 0; i < 3; i++) {
            console.log(matriz[i].join(" "));
        }

        if (ehIdentidade) {
            console.log("A matriz é uma matriz identidade.");
        } else {
            console.log("A matriz não é uma matriz identidade.");
        }
    </script>
</body>
</html>
