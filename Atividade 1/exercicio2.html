<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let media1 = (8 + 9 + 7) / 3
        let media2 = (4 + 5 + 6) / 3

        let somaDasMedia = media1 + media2
        let mediaDasMedia = somaDasMedia / 2

        document.write("Primeira media: " + media1)
        document.write("<br> Segunda media: " + media2)
        document.write("<br> Soma das medias: " + somaDasMedia)
        document.write("<br> Media da media: " + mediaDasMedia)
    </script>
</body>
</html>
