<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let ipi = Number(prompt("Digite o IPI (%):"));

      let valor1 = Number(prompt("Valor peça 1:"));
      let quant1 = Number(prompt("Quantidade peça 1:"));

      let valor2 = Number(prompt("Valor peça 2:"));
      let quant2 = Number(prompt("Quantidade peça 2:"));

      let total = (valor1 * quant1 + valor2 * quant2) * (ipi / 100 + 1);

      document.write("Total a pagar: " + total);
    </script>
  </body>
</html>
