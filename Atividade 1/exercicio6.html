<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let numero = Number(prompt("Digite um número:"));

      document.write("Antecessor: " + (numero - 1));
      document.write("<br> Sucessor: " + (numero + 1));
    </script>
  </body>
</html>
