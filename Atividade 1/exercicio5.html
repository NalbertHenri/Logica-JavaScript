<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let salarioMinimo = Number(prompt("Digite o salario minimo no seu pais: "));
      let salario = Number(prompt("Digite seu salário:"));
      let quantidade = salario / salarioMinimo;

      document.write("Você ganha " + quantidade + " salários mínimos");
    </script>
  </body>
</html>
