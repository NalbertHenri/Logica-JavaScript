<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Total de dias</title>
</head>
<body>
    <h1>Ecercicio 1</h1>

    <script>
        let anos = Number(prompt("Digite os anos: "))
        let meses = Number(prompt("Digite os meses: "))
        let dias = Number(prompt("Digite os dias: "))

        let totalDeDias = (anos * 365) + (meses * 30) + dias

        document.write("Total de dias: " + totalDeDias)

    </script>
</body>
</html>
