<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma 1 a 15</title>
</head>
<body>
    <script>
        let soma = 0

        for (let i = 0; i <= 15; i++) {
            soma = soma + i
        }

        document.write("A soma dos numero de 1 a 15: " + soma)
    </script>
</body>
</html>
