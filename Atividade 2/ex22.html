<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let soma = 0

      for (let i = 1; i <= 20; i++) {
          let numero = Number(prompt("Informe um numero: "))

          if (numero >= 0 && numero <= 100) {
              soma++
          }
      }

      document.write("Quantidade de numeros que estão entre 0 e 100: " + soma)
    </script>
  </body>
</html>
