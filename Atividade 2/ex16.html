<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media idade 20 pessoas</title>
</head>
<body>
    <script>
        let soma = 0

        for (let i = 1; i <= 20; i++) {
            let idade = Number(prompt("Qual sua idade: "))
            soma = soma + idade
            media = soma / 20
        }

        document.write("A soma das idade é: " + soma)
        document.write("<br> A media das idade é: " + media)
    </script>
</body>
</html>
