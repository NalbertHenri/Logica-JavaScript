<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Aritmetica</title>
  </head>
  <body>
    <script>
      let media1 = (8 + 9 + 7) / 3;
      let media2 = (4 + 5 + 6) / 3;

      let somaMedia = media1 + media2;
      let mediaDaMedia = (media1 + media2) / 2;

      document.write("Media 1: " + media1);
      document.write("<br> Media 2: " + media2);
      document.write("<br> Soma das media: " + somaMedia);
      document.write("<br> Media da Media: " + mediaDaMedia);
    </script>
  </body>
</html>
