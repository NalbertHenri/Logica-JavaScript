<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let soma = 0;
      let numero = 0;

      while (numero >= 0) {
        numero = Number(prompt("Digite um numero(negativo para parar): "));

        if (numero >= 0) {
          soma += numero;
        }
      }

      document.write("A soma dos números digitados é: " + soma);
    </script>
  </body>
</html>
