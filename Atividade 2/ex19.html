<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let cotacao = Number(prompt("Digite a cotação do dólar (ex: 5.20):"));
      let dolares = Number( prompt("Digite a quantidade de dólares que você possui:"),);

      let reais = dolares * cotacao;

      document.write(`Você possui R$ ${reais.toFixed(2)} em reais.`);
    </script>
  </body>
</html>
