<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soma dos Numeros</title>
  </head>
  <body>
    <script>
      let soma = 0;

      for (let i = 1; i <= 10; i++) {
        let numero = Number(prompt("Digite um numero: "));
        soma = soma + numero;
      }

      document.write("A soma dos 1o numero é: " + soma);
    </script>
  </body>
</html>
