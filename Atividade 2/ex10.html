<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reajuste</title>
</head>
<body>
    <script>
        let saldo = parseInt(prompt("Informe um saldo: "))
        let reajuste = saldo * 0.015
        let novoSaldo = saldo + reajuste

        document.write("Saldo: " + saldo)
        document.write("<br> Reajuste: " + reajuste)
        document.write("<br> Saldo com Reajuste: " + novoSaldo)
    </script>
</body>
</html>
