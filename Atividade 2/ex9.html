<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salario Minimo</title>
</head>
<body>
    <script>
        let salarioMinimo = parseInt(prompt("Qual o Salario Minimo: "))
        let salario = parseInt(prompt("Informe seu Salario: "))

        let soma = salario / salarioMinimo

        document.write("Salario Minimo: " + salarioMinimo)
        document.write("<br> Salario: " + salario)
        document.write("<br> Qunatos Salario Minimos voce recebe: " + soma)
    </script>
</body>
</html>
