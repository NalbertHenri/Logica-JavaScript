<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maior de idade 20 pessoas</title>
</head>
<body>
    <script>
        let soma = 0

        for (let i = 1; i <= 20; i++) {
            let idade = Number(prompt("Qual sua idade? "))

            if (idade >= 18) {
                soma++
            } 
        }

        document.write("Quantidade de pessoas maiores de idade é: " + soma)
    </script>
</body>
</html>
