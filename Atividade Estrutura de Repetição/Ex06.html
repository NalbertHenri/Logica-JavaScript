<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numero = Number(prompt("Digite um numero: "))
        let i = 0 

        while (i <= numero) {

            if (numero % i == 0) {
                document.write(i + "<br>")
            }

            i++
        }


    </script>
</body>
</html>
