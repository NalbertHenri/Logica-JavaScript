
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 44</title>
  </head>
  <body>
    <script>
        let numero = parseInt(prompt("Digite um numero inteiro:"));
        let fatorial = 1;

        for (let i = 1; i <= numero; i++) {
            fatorial *= i;
        }

        document.write("O fatorial de " + numero + " e: " + fatorial);
    </script>
  </body>
</html>
