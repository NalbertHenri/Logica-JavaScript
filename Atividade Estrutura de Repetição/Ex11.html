<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numero = Number(prompt("Digite um numero inteiro: "))
        let i = 2
        let soma = 0

        while (i < numero) {
            soma += 1
            i += 2
        }

        document.write("Soma dos números pares:", soma);
    </script>
</body>
</html>
