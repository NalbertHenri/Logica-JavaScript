<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 25</title>
</head>
<body>
    <script>
        let a = 0;
        let b = 1;
        let i = 0;

        do {
            document.write(a + "<br>");
            let temp = a + b;
            a = b;
            b = temp;
            i++;
        } while (i < 20);
    </script>
</body>
