<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 17</title>
</head>
<body>
    <script>
        let i = 1;
        let soma = 0;
        do {
            soma += i;
            i++;
        } while (i <= 100);

        document.write("A soma dos numeros de 1 a 100 e: " + soma);
    </script>
</body>
</html>
