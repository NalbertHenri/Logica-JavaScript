<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 15</title>
</head>
<body>
    <script>
        let somaIdades = 0;
        let contador = 0;
        while (true) {
            let nome = prompt("Digite o nome da pessoa (ou 'fim' para encerrar):");
            if (nome.toLowerCase() === "fim") {
            break;
            }
            let idade = parseInt(prompt("Digite a idade de " + nome + ":"));
            somaIdades += idade;
            contador++;
        }
        
        if (contador > 0) {
            let mediaIdades = somaIdades / contador;
            document.write("A média das idades é: " + mediaIdades);
        } else {
            document.write("Nenhuma pessoa foi cadastrada.");
        }
    </script>
</body>
</html>
