<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let i = 1
        let soma = 0
        let nome;
        let idade;

        while (i <= 5) {
            nome = Number(prompt(`Digite o ${i}º nome:`))
            idade = Number(prompt(`Digite o ${i}º idade:`))
            soma += idade
            i++
        }

        let media = soma / 5
        document.write("Media: " + media)
    </script>
</body>
</html>
