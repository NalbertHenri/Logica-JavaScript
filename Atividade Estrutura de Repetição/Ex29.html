<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 29</title>
  </head>
  <body>
    <script>
        let numero = parseInt(prompt("Digite um numero inteiro:"));
        let i = 1;
        let fatorial = 1;

        do {
            fatorial *= i;
            i++;
        } while (i <= numero);

        document.write("O fatorial de " + numero + " e: " + fatorial);
    </script>
  </body>
</html>
