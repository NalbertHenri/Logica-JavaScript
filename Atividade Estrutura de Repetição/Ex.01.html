<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        let numero = 0

        while (numero <= 10) {
            document.write(numero + "<br>")
            numero++
        }
    </script>
