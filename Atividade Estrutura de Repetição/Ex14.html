<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numero = Number(prompt("Digite um numero interio: "))
        let i = 1
        let fatorial = 1

        while (i <= numero) {
        fatorial *= i;
        i++;
        }

        document.write("O fatorial de " + numero + " é: " + fatorial);
    </script>
</body>
</html>
