<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Aritmetica</title>
  </head>
  <body>
    <script>
      let contador = 0;
      let soma = 0;

      for (let i = 15; i <= 100; i++) {
        soma = soma + i;
        contador++;
      }

      let media = soma / contador;
      document.write("A media é: " + media);
    </script>
  </body>
</html>
