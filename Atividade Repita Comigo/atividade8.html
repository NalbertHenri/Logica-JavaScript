<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let N = Number(prompt("Digite um valor maior que 0:"));

      for (let i = 1; i <= N; i++) {
        document.write(i + "<br>");
      }
    </script>
  </body>
</html>
