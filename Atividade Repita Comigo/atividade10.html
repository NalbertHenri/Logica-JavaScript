<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let N = Number(prompt("Digite até qual tabuada deseja (N):"));

      for (let i = 1; i <= N; i++) {
        document.write("<br>Tabuada do " + i + "<br>");

        for (let j = 1; j <= 10; j++) {
          document.write(i + " x " + j + " = " + i * j + "<br>");
        }
      }
    </script>
  </body>
</html>
